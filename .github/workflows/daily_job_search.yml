name: Daily Job Search Automation

on:
  schedule:
    # Runs daily at 17:30 UTC (11:00 PM IST)
    - cron: '30 17 * * *'
  workflow_dispatch:  # Allows manual triggering

jobs:
  search_jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run job search automation
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: |
        python job_search_simple.py
    
    - name: Upload job results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: job-results-${{ github.run_number }}
        path: job_results_*.json
        retention-days: 30
